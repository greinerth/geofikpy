# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - curl -sL
      "https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz" -o
      eigen.tar.gz
    - mkdir -p eigen-src
    - tar -xzf eigen.tar.gz -C eigen-src --strip-components=1
    - cmake -S eigen-src -B build_eigen -DBUILD_TESTING=OFF
      -DCMAKE_INSTALL_PREFIX=$PWD/eigen_install
    - cmake --build build_eigen --target install
    - CMAKE_PREFIX_PATH=$PWD/eigen_install uv sync --group docs
    - uv run python -m sphinx -T -b html -d docs/_build/doctrees -D language=en
      docs $READTHEDOCS_OUTPUT/html
