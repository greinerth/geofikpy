name: wheels

on:
  workflow_dispatch:
  release:
    types:
      - published
  pull_request:
    paths:
      - .github/workflows/cd.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Many color libraries just need this to be set to any value, but at least
  # one distinguishes color depth, where "3" -> "256-bit color".
  FORCE_COLOR: 3

jobs:
  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Eigen (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -sL "https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz" -o eigen.tar.gz
          mkdir -p eigen-src
          tar -xzf eigen.tar.gz -C eigen-src --strip-components=1
          cmake -S eigen-src -B build_eigen -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/eigen"
          cmake --build build_eigen --target install
          echo "CMAKE_PREFIX_PATH=$RUNNER_TEMP/eigen" >> "$GITHUB_ENV"

      - name: Install Eigen (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl.exe -sL "https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz" -o eigen.tar.gz
          New-Item -ItemType Directory -Force -Path eigen-src | Out-Null
          tar.exe -xzf eigen.tar.gz -C eigen-src --strip-components=1
          $EigenPath = "$env:RUNNER_TEMP/eigen".Replace('\', '/')
          cmake -S eigen-src -B build_eigen -DBUILD_TESTING=OFF "-DCMAKE_INSTALL_PREFIX=$EigenPath"
          cmake --build build_eigen --target install
          "CMAKE_PREFIX_PATH=$EigenPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build SDist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel
          - macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install Eigen (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -sL "https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz" -o eigen.tar.gz
          mkdir -p eigen-src
          tar -xzf eigen.tar.gz -C eigen-src --strip-components=1
          cmake -S eigen-src -B build_eigen -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/eigen"
          cmake --build build_eigen --target install
          echo "CMAKE_PREFIX_PATH=$RUNNER_TEMP/eigen" >> "$GITHUB_ENV"

      - name: Install Eigen (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl.exe -sL "https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz" -o eigen.tar.gz
          New-Item -ItemType Directory -Force -Path eigen-src | Out-Null
          tar.exe -xzf eigen.tar.gz -C eigen-src --strip-components=1
          $EigenPath = "$env:RUNNER_TEMP/eigen".Replace('\', '/')
          cmake -S eigen-src -B build_eigen -DBUILD_TESTING=OFF "-DCMAKE_INSTALL_PREFIX=$EigenPath"
          cmake --build build_eigen --target install
          "CMAKE_PREFIX_PATH=$EigenPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_BEFORE_ALL_LINUX: >
            if command -v apk >/dev/null 2>&1; then apk add --no-cache cmake;
            elif command -v apt-get >/dev/null 2>&1; then apt-get update &&
            apt-get install -y cmake; elif command -v dnf >/dev/null 2>&1; then
            dnf install -y cmake; else yum install -y cmake; fi && curl -sL
            "https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz"
            -o eigen.tar.gz && mkdir -p eigen-src && tar -xzf eigen.tar.gz -C
            eigen-src --strip-components=1 && rm -rf build_eigen && cmake -S
            eigen-src -B build_eigen -DBUILD_TESTING=OFF && cmake --build
            build_eigen --target install

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  upload_all:
    needs: [build_wheels, make_sdist]
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Remember to tell (test-)pypi about this repo before publishing
          # Remove this line to publish to PyPI
          repository-url: https://test.pypi.org/legacy/
